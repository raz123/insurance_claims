<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insurance Claim Submission</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    

    <!-- Main Content App -->
    <main id="app-content">
        
        <header class="app-header">
            <h1>New Claim</h1>
        </header>

        <!-- AI Engine & Storage Dashboard -->
        <section id="ai-dashboard" class="glass-card dashboard-card">
            <div class="dashboard-header">
                <h3><i class="icon-cpu"></i> AI Engine & Local Storage</h3>
                <div class="header-actions">
                    <button id="clear-cache-btn" class="btn-text">Clear All Cache</button>
                    <button id="refresh-status-btn" class="icon-btn" title="Refresh Status">🔄</button>
                </div>
            </div>
            
            <div class="status-grid">
                <div class="status-item" data-file="vision_encoder_int8.onnx">
                    <div class="file-info">
                        <span class="file-name">Vision Encoder</span>
                        <span class="badge">Checking...</span>
                    </div>
                    <button class="sideload-btn" onclick="document.getElementById('upload-vision').click()">📂</button>
                    <input type="file" id="upload-vision" class="hidden" accept=".onnx">
                </div>
                <div class="status-item" data-file="language_model_int8.onnx">
                    <div class="file-info">
                        <span class="file-name">Language Decoder</span>
                        <span class="badge">Checking...</span>
                    </div>
                    <button class="sideload-btn" onclick="document.getElementById('upload-language').click()">📂</button>
                    <input type="file" id="upload-language" class="hidden" accept=".onnx">
                </div>
                <div class="status-item" data-file="text_embeddings.onnx">
                    <div class="file-info">
                        <span class="file-name">Embeddings</span>
                        <span class="badge">Checking...</span>
                    </div>
                    <button class="sideload-btn" onclick="document.getElementById('upload-embeds').click()">📂</button>
                    <input type="file" id="upload-embeds" class="hidden" accept=".onnx">
                </div>
                <div class="status-item" data-file="prefill_int8.onnx">
                    <div class="file-info">
                        <span class="file-name">KV Prefill</span>
                        <span class="badge">Checking...</span>
                    </div>
                    <button class="sideload-btn" onclick="document.getElementById('upload-prefill').click()">📂</button>
                    <input type="file" id="upload-prefill" class="hidden" accept=".onnx">
                </div>
                <div class="status-item" data-file="decode_int8.onnx">
                    <div class="file-info">
                        <span class="file-name">KV Decode</span>
                        <span class="badge">Checking...</span>
                    </div>
                    <button class="sideload-btn" onclick="document.getElementById('upload-decode').click()">📂</button>
                    <input type="file" id="upload-decode" class="hidden" accept=".onnx">
                </div>
            </div>

            <div class="cloud-settings">
                <label>Apps Script URL:</label>
                <input type="text" id="apps-script-url" class="form-input" placeholder="https://script.google.com/.../exec">
            </div>
        </section>

        <!-- Main Workspace -->
        <main class="main-container">
            <div class="image-preview" id="image-preview">
                <span id="preview-placeholder">📷 Tap to snap receipt</span>
                <img id="receipt-img" style="display: none;" alt="Receipt Preview">
            </div>
            <!-- Hidden file input triggered by tapping the preview square -->
            <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
            
            <button id="process-ocr-btn" class="btn btn-accent hidden">Scan Document</button>
        </section>

        <!-- Loading / OCR Processing Status -->
        <div id="loading-indicator" class="hidden">
                <div class="spinner"></div>
                <p id="loading-text">Initializing AI...</p>
                <div id="progress-bars-container">
                    <!-- Dynamic progress bars injected here -->
                </div>
            </div>

            <div id="extraction-feed-container" class="hidden">
                <label>Live AI Extraction:</label>
                <div id="extraction-feed"></div>
            </div>

        <!-- Claim Form -->
        <form id="claim-form" class="glass-card form-container">
            <div class="input-group">
                <label for="spender">Spender</label>
                <select id="spender" name="spender" class="form-input">
                    <option value="R" selected>R (Default)</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="date-input">Date</label>
                    <input type="date" id="date-input" name="date" class="form-input" required>
                </div>
                <div class="input-group">
                    <label for="amount-input">Amount ($)</label>
                    <input type="number" step="0.01" id="amount-input" name="amount" class="form-input" required>
                </div>
            </div>

            <div class="input-group">
                <label for="vendor-input">Vendor / Provider</label>
                <input type="text" id="vendor-input" name="vendor" class="form-input" required>
            </div>

            <button type="submit" id="submit-claim-btn" class="btn btn-primary submit-btn" disabled>Submit Claim</button>
        </form>
    </main>

    <!-- JS Inclusions -->
    <!-- We load transformers.js dynamically if needed, or Tesseract.js dynamically -->
    <script src="app.js" defer></script>
</body>
</html>
